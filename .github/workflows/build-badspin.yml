name: Build BadSpin APK

on:
  push:
    branches: [ "main", "master" ] # Запускать при пуше в основную ветку
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Позволяет запускать сборку вручную из вкладки Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Установка NDK (необходим для компиляции .so через Makefile)
      - name: Install NDK
        run: |
          sdkmanager "ndk;25.2.9519653" # Версия по умолчанию, можно сменить
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/25.2.9519653" >> $GITHUB_ENV

      # Шаг 1: Компиляция нативной библиотеки
      - name: Compile libbadspin.so
        run: |
          cd src
          # Команда 'make push' в оригинальном репо собирает .so и копирует в assets.
          # Если 'make push' пытается выполнить 'adb push', это вызовет ошибку в CI.
          # Мы добавим '|| true', чтобы сборка продолжалась, если adb недоступен, 
          # так как файл в assets все равно попадет.
          make push || echo "Adb push failed, but assets should be copied."
      - name: Upload libbadspin.so
        uses: actions/upload-artifact@v4
        with:
          name: libbadspin
          path: src/libbadspin.so
          if-no-files-found: error
      # Шаг 2: Сборка Android приложения
      - name: Build Demo App APK
        run: |
          cd app
          chmod +x gradlew
          ./gradlew assembleDebug

      # Шаг 3: Сохранение результата (Артефакты)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BadSpin-Debug-APK
          path: app/app/build/outputs/apk/debug/app-debug.apk
